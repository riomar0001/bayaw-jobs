name: bayaw-jobs-db

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_instance_bayaw_jobs
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bayaw_jobs_network
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c logging_collector=on
      -c log_destination=stderr
      -c log_statement=all
      -c log_min_duration_statement=0
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_bayaw_jobs
    networks:
      - bayaw_jobs_network
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/pgadmin4
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis_instance_bayaw_jobs
    restart: unless-stopped
    command: >
      redis-server
      --requirepass password
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bayaw_jobs_network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis_insight_bayaw_jobs
    networks:
      - bayaw_jobs_network
    ports:
      - "5540:5540"
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_bayaw_jobs
    restart: unless-stopped
    networks:
      - bayaw_jobs_network
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_bayaw_jobs
    restart: unless-stopped
    networks:
      - bayaw_jobs_network
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-password}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:-tlfQS8ZrK6Ww11HmjPl2nZJs9IiT7tAt}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  bayaw_jobs_network:
    driver: bridge
